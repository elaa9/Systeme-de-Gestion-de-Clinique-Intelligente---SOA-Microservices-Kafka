<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Arial, sans-serif">
  <rect width="900" height="600" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">Architecture Microservices — Gestion de Clinique</text>

  <!-- Client -->
  <rect x="350" y="70" width="200" height="50" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Client / Test</text>

  <!-- Arrow down -->
  <line x1="450" y1="120" x2="450" y2="160" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- API Gateway -->
  <rect x="300" y="160" width="300" height="70" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="450" y="190" text-anchor="middle" fill="white" font-size="16" font-weight="bold">API Gateway</text>
  <text x="450" y="210" text-anchor="middle" fill="white" font-size="12">REST (Express) + GraphQL</text>

  <!-- Arrows from Gateway to Services -->
  <line x1="320" y1="230" x2="150" y2="310" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="230" x2="450" y2="310" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="230" x2="750" y2="310" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- gRPC label -->
  <text x="220" y="270" text-anchor="middle" fill="#7f8c8d" font-size="11" transform="rotate(-30, 220, 270)">gRPC</text>
  <text x="450" y="265" text-anchor="middle" fill="#7f8c8d" font-size="11">gRPC</text>
  <text x="680" y="270" text-anchor="middle" fill="#7f8c8d" font-size="11" transform="rotate(30, 680, 270)">gRPC</text>

  <!-- Patient Service -->
  <rect x="50" y="310" width="220" height="60" rx="8" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="160" y="336" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Patient Service</text>
  <text x="160" y="354" text-anchor="middle" fill="white" font-size="11">Profils patients • SQLite3</text>

  <!-- Appointment Service -->
  <rect x="340" y="310" width="220" height="60" rx="8" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="450" y="336" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Appointment Service</text>
  <text x="450" y="354" text-anchor="middle" fill="white" font-size="11">Rendez-vous • SQLite3</text>

  <!-- Prescription Service -->
  <rect x="630" y="310" width="220" height="60" rx="8" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="740" y="336" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Prescription Service</text>
  <text x="740" y="354" text-anchor="middle" fill="white" font-size="11">Ordonnances • RxDB</text>

  <!-- Kafka bus -->
  <rect x="100" y="420" width="700" height="50" rx="8" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>
  <text x="450" y="450" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Apache Kafka — Event Bus</text>

  <!-- Arrows to Kafka -->
  <line x1="160" y1="370" x2="160" y2="420" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="370" x2="450" y2="420" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="370" x2="740" y2="420" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrows from Kafka -->
  <line x1="200" y1="470" x2="200" y2="520" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="520" y1="470" x2="520" y2="520" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Consumers -->
  <rect x="100" y="520" width="200" height="40" rx="6" fill="#f39c12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="200" y="545" text-anchor="middle" fill="white" font-size="11">Patient Consumer</text>

  <rect x="420" y="520" width="200" height="40" rx="6" fill="#f39c12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="520" y="545" text-anchor="middle" fill="white" font-size="11">Appointment Consumer</text>

  <!-- Kafka labels -->
  <text x="300" y="440" fill="white" font-size="10">appointment.booked</text>
  <text x="400" y="440" fill="white" font-size="10">appointment.completed</text>
  <text x="530" y="440" fill="white" font-size="10">prescription.issued</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7f8c8d"/>
    </marker>
  </defs>
</svg>
